name: tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Cancel in-progress runs for the same branch on new pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Unit + integration tests across Python versions ───────────
  test:
    name: "Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      # Don't cancel siblings if one fails; we want to see all results.
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements*.txt', 'pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Create venv and install
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install mcp
          # Install the package itself in editable mode so we test
          # the actual imports, not the loose .py files in cwd.
          pip install -e .

      - name: Run all test suites
        shell: bash
        run: |
          set +e
          pass=0
          fail=0
          # Tests live under tests/ but import project modules (pruner_core,
          # cli, etc.) from the repo root. PYTHONPATH=. makes the root
          # importable regardless of cwd.
          for t in tests/test_pruner tests/test_pruner_realistic tests/test_expr_eval \
                   tests/test_skeletonizer tests/test_dep_graph tests/test_conditional_dep_graph \
                   tests/test_cc_parser_cache tests/test_config tests/test_errors tests/test_token_budget \
                   tests/test_clang_sysroot tests/test_patch_applier tests/test_cli tests/test_backends \
                   tests/test_mcp_server tests/test_safety tests/test_truncation \
                   tests/test_bootstrap; do
            PYTHONPATH=. .venv/bin/python "${t}.py" > /tmp/test_out.log 2>&1
            rc=$?
            if [ $rc -eq 0 ]; then
              echo "  $t: PASS"
              pass=$((pass+1))
            else
              echo "  $t: FAIL (rc=$rc)"
              cat /tmp/test_out.log
              fail=$((fail+1))
            fi
          done
          echo
          echo "Suites: $pass passed, $fail failed"
          if [ $fail -gt 0 ]; then
            exit 1
          fi

  # ── Lint (lightweight; no flake8/pylint to keep deps minimal) ─
  lint:
    name: "syntax check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile-check all .py files
        run: |
          python -m compileall -q . || exit 1
      - name: AST-check all .py files
        run: |
          python -c "
          import ast, os, sys
          ok = True
          for root, dirs, files in os.walk('.'):
              if '.venv' in dirs:
                  dirs.remove('.venv')
              if '.git' in dirs:
                  dirs.remove('.git')
              for f in files:
                  if f.endswith('.py'):
                      p = os.path.join(root, f)
                      try:
                          with open(p) as fh:
                              ast.parse(fh.read())
                      except SyntaxError as e:
                          print(f'SYNTAX ERROR in {p}: {e}')
                          ok = False
          sys.exit(0 if ok else 1)
          "
